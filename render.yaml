services:
  - type: web
    name: datamatch-backend
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: true
      - key: CORS_ORIGIN
        value: https://client-elzeds-projects.vercel.app
